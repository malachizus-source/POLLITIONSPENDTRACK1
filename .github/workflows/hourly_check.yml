name: Hourly Budget Check

on:
  schedule:
    # הקוד הזה אומר לגיטהב להריץ את הבוט פעם בשעה
    - cron: '0 * * * *'
  workflow_dispatch: # מאפשר לך להריץ את הבוט גם ידנית לבדיקה

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
         FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POLITISPENDTRACK }}
        run: python bot.py
